<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Road Racer</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;family=Rajdhani:wght@500;700&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    
    @keyframes roadMove {
      0% { background-position: 0 0; }
      100% { background-position: 0 100px; }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    @keyframes sparkle {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }
    
    .road-animation {
      animation: roadMove 0.3s linear infinite;
    }
    
    .pulse-animation {
      animation: pulse 2s ease-in-out infinite;
    }
    
    .shake-animation {
      animation: shake 0.1s ease-in-out;
    }
    
    .sparkle-animation {
      animation: sparkle 0.3s ease-out;
    }
    
    .car-shadow {
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
    }
    
    .neon-text {
      text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 40px currentColor;
    }
    
    .obstacle-glow {
      filter: drop-shadow(0 0 8px rgba(255,100,100,0.6));
    }
    
    .coin-glow {
      filter: drop-shadow(0 0 10px rgba(255,215,0,0.8));
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full m-0 p-0 overflow-hidden">
  <div id="game-container" class="h-full w-full flex flex-col items-center justify-center" style="background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);"><!-- Start Screen -->
   <div id="start-screen" class="flex flex-col items-center justify-center text-center p-8">
    <h1 id="game-title" class="text-5xl md:text-7xl font-black mb-4 neon-text pulse-animation" style="font-family: 'Orbitron', monospace; color: #00ffff;">ROAD RACER</h1>
    <p class="text-xl md:text-2xl mb-8" style="font-family: 'Rajdhani', sans-serif; color: #a0a0ff;">Dodge traffic • Collect coins • Beat your score!</p>
    <div class="mb-8">
     <svg width="120" height="180" viewbox="0 0 60 90" class="car-shadow pulse-animation"><rect x="10" y="15" width="40" height="60" rx="8" fill="#ff3366" /> <rect x="12" y="20" width="36" height="20" rx="4" fill="#1a1a2e" /> <rect x="12" y="55" width="36" height="15" rx="4" fill="#1a1a2e" /> <rect x="5" y="25" width="8" height="15" rx="2" fill="#333" /> <rect x="47" y="25" width="8" height="15" rx="2" fill="#333" /> <rect x="5" y="50" width="8" height="15" rx="2" fill="#333" /> <rect x="47" y="50" width="8" height="15" rx="2" fill="#333" /> <circle cx="20" cy="10" r="5" fill="#ffff00" /> <circle cx="40" cy="10" r="5" fill="#ffff00" /> <rect x="25" y="75" width="10" height="8" rx="2" fill="#ff0000" />
     </svg>
    </div><button id="start-btn" class="px-12 py-4 text-2xl font-bold rounded-full transition-all duration-300 hover:scale-110 hover:shadow-2xl" style="font-family: 'Orbitron', monospace; background: linear-gradient(90deg, #00ffff, #00ff88); color: #0f0c29;"> 🏁 START RACE </button>
    <div class="mt-8 text-lg" style="font-family: 'Rajdhani', sans-serif; color: #888;">
     <p>← → Arrow Keys or Touch to Move</p>
    </div>
   </div><!-- Game Screen -->
   <div id="game-screen" class="hidden h-full w-full flex flex-col items-center relative overflow-hidden"><!-- HUD -->
    <div class="absolute top-0 left-0 right-0 z-20 flex justify-between items-center p-4 md:p-6" style="background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);">
     <div class="flex items-center gap-2"><span class="text-2xl">🪙</span> <span id="score" class="text-2xl md:text-3xl font-bold" style="font-family: 'Orbitron', monospace; color: #ffd700;">0</span>
     </div>
     <div class="flex items-center gap-2"><span class="text-2xl">🏆</span> <span id="high-score" class="text-xl md:text-2xl font-bold" style="font-family: 'Orbitron', monospace; color: #00ffff;">0</span>
     </div>
    </div><!-- Road -->
    <div id="road" class="relative h-full" style="width: min(100%, 400px); background: linear-gradient(90deg, #1a1a2e 0%, #2d2d44 10%, #3d3d5c 20%, #3d3d5c 80%, #2d2d44 90%, #1a1a2e 100%);"><!-- Road markings -->
     <div class="absolute inset-0 road-animation" style="background: repeating-linear-gradient(180deg, transparent 0px, transparent 40px, #ffff00 40px, #ffff00 80px, transparent 80px, transparent 100px); opacity: 0.3;"></div>
     <div class="absolute left-1/2 top-0 bottom-0 w-1 -ml-0.5 road-animation" style="background: repeating-linear-gradient(180deg, #fff 0px, #fff 30px, transparent 30px, transparent 60px);"></div><!-- Game elements container -->
     <div id="game-elements" class="absolute inset-0"></div><!-- Player Car -->
     <div id="player-car" class="absolute car-shadow transition-all duration-100" style="width: 60px; height: 90px; bottom: 80px; left: calc(50% - 30px);">
      <svg viewbox="0 0 60 90" width="60" height="90"><rect x="10" y="15" width="40" height="60" rx="8" fill="#ff3366" /> <rect x="12" y="20" width="36" height="20" rx="4" fill="#1a1a2e" /> <rect x="12" y="55" width="36" height="15" rx="4" fill="#1a1a2e" /> <rect x="5" y="25" width="8" height="15" rx="2" fill="#333" /> <rect x="47" y="25" width="8" height="15" rx="2" fill="#333" /> <rect x="5" y="50" width="8" height="15" rx="2" fill="#333" /> <rect x="47" y="50" width="8" height="15" rx="2" fill="#333" /> <circle cx="20" cy="10" r="5" fill="#ffff00" /> <circle cx="40" cy="10" r="5" fill="#ffff00" /> <rect x="25" y="75" width="10" height="8" rx="2" fill="#ff0000" />
      </svg>
     </div>
    </div><!-- Touch Controls -->
    <div class="absolute bottom-4 left-0 right-0 flex justify-center gap-8 md:hidden z-20"><button id="left-btn" class="w-16 h-16 rounded-full text-3xl flex items-center justify-center active:scale-90" style="background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);">←</button> <button id="right-btn" class="w-16 h-16 rounded-full text-3xl flex items-center justify-center active:scale-90" style="background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);">→</button>
    </div>
   </div><!-- Game Over Screen -->
   <div id="gameover-screen" class="hidden flex flex-col items-center justify-center text-center p-8">
    <h2 class="text-4xl md:text-6xl font-black mb-4 neon-text" style="font-family: 'Orbitron', monospace; color: #ff3366;">GAME OVER</h2>
    <div class="my-8 p-6 rounded-2xl" style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);">
     <p class="text-xl mb-2" style="font-family: 'Rajdhani', sans-serif; color: #aaa;">Your Score</p>
     <p id="final-score" class="text-5xl font-bold mb-4" style="font-family: 'Orbitron', monospace; color: #ffd700;">0</p>
     <p class="text-lg" style="font-family: 'Rajdhani', sans-serif; color: #aaa;">Best Score</p>
     <p id="final-high-score" class="text-3xl font-bold" style="font-family: 'Orbitron', monospace; color: #00ffff;">0</p>
    </div>
    <div id="new-record" class="hidden mb-6 text-2xl font-bold sparkle-animation" style="font-family: 'Orbitron', monospace; color: #00ff88;">
     🎉 NEW RECORD! 🎉
    </div><button id="restart-btn" class="px-12 py-4 text-2xl font-bold rounded-full transition-all duration-300 hover:scale-110 hover:shadow-2xl" style="font-family: 'Orbitron', monospace; background: linear-gradient(90deg, #ff3366, #ff6b6b); color: #fff;"> 🔄 PLAY AGAIN </button>
   </div>
  </div>
  <script>
    // Default configuration
    const defaultConfig = {
      game_title: 'ROAD RACER',
      background_color: '#0f0c29',
      accent_color: '#00ffff',
      car_color: '#ff3366',
      text_color: '#ffffff',
      secondary_color: '#302b63',
      font_family: 'Orbitron',
      font_size: 16
    };

    let config = { ...defaultConfig };

    // Game state
    let gameState = {
      isPlaying: false,
      score: 0,
      highScore: parseInt(localStorage.getItem('roadRacerHighScore') || '0'),
      playerX: 170,
      obstacles: [],
      coins: [],
      gameSpeed: 5,
      lastObstacleTime: 0,
      lastCoinTime: 0,
      animationId: null
    };

    // DOM elements
    const startScreen = document.getElementById('start-screen');
    const gameScreen = document.getElementById('game-screen');
    const gameoverScreen = document.getElementById('gameover-screen');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');
    const playerCar = document.getElementById('player-car');
    const gameElements = document.getElementById('game-elements');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('high-score');
    const finalScoreEl = document.getElementById('final-score');
    const finalHighScoreEl = document.getElementById('final-high-score');
    const newRecordEl = document.getElementById('new-record');
    const leftBtn = document.getElementById('left-btn');
    const rightBtn = document.getElementById('right-btn');
    const road = document.getElementById('road');
    const gameTitle = document.getElementById('game-title');

    // Initialize high score display
    highScoreEl.textContent = gameState.highScore;

    // Render function to apply config
    async function onConfigChange(cfg) {
      config = { ...defaultConfig, ...cfg };
      
      // Update title
      gameTitle.textContent = config.game_title || defaultConfig.game_title;
      
      // Update colors
      const container = document.getElementById('game-container');
      container.style.background = `linear-gradient(135deg, ${config.background_color || defaultConfig.background_color} 0%, ${config.secondary_color || defaultConfig.secondary_color} 50%, ${config.background_color || defaultConfig.background_color} 100%)`;
      
      gameTitle.style.color = config.accent_color || defaultConfig.accent_color;
      
      // Update font
      const customFont = config.font_family || defaultConfig.font_family;
      gameTitle.style.fontFamily = `'${customFont}', 'Orbitron', monospace`;
      
      // Update font size
      const baseSize = config.font_size || defaultConfig.font_size;
      gameTitle.style.fontSize = `${baseSize * 3}px`;
    }

    // Element SDK initialization
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities: (cfg) => ({
          recolorables: [
            {
              get: () => cfg.background_color || defaultConfig.background_color,
              set: (v) => { cfg.background_color = v; window.elementSdk.setConfig({ background_color: v }); }
            },
            {
              get: () => cfg.secondary_color || defaultConfig.secondary_color,
              set: (v) => { cfg.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); }
            },
            {
              get: () => cfg.accent_color || defaultConfig.accent_color,
              set: (v) => { cfg.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); }
            }
          ],
          borderables: [],
          fontEditable: {
            get: () => cfg.font_family || defaultConfig.font_family,
            set: (v) => { cfg.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
          },
          fontSizeable: {
            get: () => cfg.font_size || defaultConfig.font_size,
            set: (v) => { cfg.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
          }
        }),
        mapToEditPanelValues: (cfg) => new Map([
          ['game_title', cfg.game_title || defaultConfig.game_title]
        ])
      });
    }

    // Game functions
    function showScreen(screen) {
      startScreen.classList.add('hidden');
      gameScreen.classList.add('hidden');
      gameoverScreen.classList.add('hidden');
      screen.classList.remove('hidden');
    }

    function startGame() {
      gameState = {
        ...gameState,
        isPlaying: true,
        score: 0,
        playerX: road.offsetWidth / 2 - 30,
        obstacles: [],
        coins: [],
        gameSpeed: 5,
        lastObstacleTime: 0,
        lastCoinTime: 0
      };
      
      gameElements.innerHTML = '';
      scoreEl.textContent = '0';
      playerCar.style.left = gameState.playerX + 'px';
      
      showScreen(gameScreen);
      gameLoop();
    }

    function endGame() {
      gameState.isPlaying = false;
      cancelAnimationFrame(gameState.animationId);
      
      if (gameState.score > gameState.highScore) {
        gameState.highScore = gameState.score;
        localStorage.setItem('roadRacerHighScore', gameState.highScore.toString());
        newRecordEl.classList.remove('hidden');
      } else {
        newRecordEl.classList.add('hidden');
      }
      
      finalScoreEl.textContent = gameState.score;
      finalHighScoreEl.textContent = gameState.highScore;
      highScoreEl.textContent = gameState.highScore;
      
      showScreen(gameoverScreen);
    }

    function createObstacle() {
      const roadWidth = road.offsetWidth;
      const lanes = [roadWidth * 0.15, roadWidth * 0.5 - 25, roadWidth * 0.85 - 50];
      const lane = lanes[Math.floor(Math.random() * lanes.length)];
      const colors = ['#4a90d9', '#9b59b6', '#27ae60', '#e67e22', '#1abc9c'];
      const color = colors[Math.floor(Math.random() * colors.length)];
      
      const obstacle = document.createElement('div');
      obstacle.className = 'absolute obstacle-glow';
      obstacle.style.cssText = `width: 50px; height: 80px; left: ${lane}px; top: -80px;`;
      obstacle.innerHTML = `
        <svg viewBox="0 0 50 80" width="50" height="80">
          <rect x="5" y="10" width="40" height="55" rx="6" fill="${color}"/>
          <rect x="7" y="45" width="36" height="15" rx="3" fill="#1a1a2e"/>
          <rect x="0" y="20" width="8" height="12" rx="2" fill="#333"/>
          <rect x="42" y="20" width="8" height="12" rx="2" fill="#333"/>
          <rect x="0" y="45" width="8" height="12" rx="2" fill="#333"/>
          <rect x="42" y="45" width="8" height="12" rx="2" fill="#333"/>
          <rect x="20" y="5" width="10" height="6" rx="2" fill="#ff0000"/>
        </svg>
      `;
      
      gameElements.appendChild(obstacle);
      gameState.obstacles.push({ element: obstacle, x: lane, y: -80 });
    }

    function createCoin() {
      const roadWidth = road.offsetWidth;
      const x = Math.random() * (roadWidth - 40) + 20;
      
      const coin = document.createElement('div');
      coin.className = 'absolute coin-glow';
      coin.style.cssText = `width: 30px; height: 30px; left: ${x}px; top: -30px;`;
      coin.innerHTML = `
        <svg viewBox="0 0 30 30" width="30" height="30">
          <circle cx="15" cy="15" r="14" fill="#ffd700" stroke="#ffaa00" stroke-width="2"/>
          <text x="15" y="20" text-anchor="middle" fill="#996600" font-size="14" font-weight="bold">$</text>
        </svg>
      `;
      
      gameElements.appendChild(coin);
      gameState.coins.push({ element: coin, x: x, y: -30 });
    }

    function checkCollision(obj, width, height) {
      const playerLeft = gameState.playerX;
      const playerRight = gameState.playerX + 60;
      const playerTop = road.offsetHeight - 170;
      const playerBottom = road.offsetHeight - 80;
      
      const objLeft = obj.x;
      const objRight = obj.x + width;
      const objTop = obj.y;
      const objBottom = obj.y + height;
      
      return playerLeft < objRight && playerRight > objLeft && playerTop < objBottom && playerBottom > objTop;
    }

    function gameLoop() {
      if (!gameState.isPlaying) return;
      
      const now = Date.now();
      const roadHeight = road.offsetHeight;
      
      // Spawn obstacles
      if (now - gameState.lastObstacleTime > 1500 - Math.min(gameState.score * 5, 800)) {
        createObstacle();
        gameState.lastObstacleTime = now;
      }
      
      // Spawn coins
      if (now - gameState.lastCoinTime > 800) {
        createCoin();
        gameState.lastCoinTime = now;
      }
      
      // Update obstacles
      gameState.obstacles = gameState.obstacles.filter(obs => {
        obs.y += gameState.gameSpeed;
        obs.element.style.top = obs.y + 'px';
        
        if (checkCollision(obs, 50, 80)) {
          playerCar.classList.add('shake-animation');
          setTimeout(() => playerCar.classList.remove('shake-animation'), 100);
          endGame();
          return false;
        }
        
        if (obs.y > roadHeight) {
          obs.element.remove();
          return false;
        }
        return true;
      });
      
      // Update coins
      gameState.coins = gameState.coins.filter(coin => {
        coin.y += gameState.gameSpeed;
        coin.element.style.top = coin.y + 'px';
        
        if (checkCollision(coin, 30, 30)) {
          coin.element.classList.add('sparkle-animation');
          setTimeout(() => coin.element.remove(), 300);
          gameState.score += 10;
          scoreEl.textContent = gameState.score;
          
          // Increase speed every 100 points
          if (gameState.score % 100 === 0) {
            gameState.gameSpeed = Math.min(gameState.gameSpeed + 0.5, 15);
          }
          return false;
        }
        
        if (coin.y > roadHeight) {
          coin.element.remove();
          return false;
        }
        return true;
      });
      
      gameState.animationId = requestAnimationFrame(gameLoop);
    }

    // Controls
    const moveSpeed = 15;
    const keys = { left: false, right: false };

    function movePlayer() {
      if (!gameState.isPlaying) return;
      
      const roadWidth = road.offsetWidth;
      
      if (keys.left) {
        gameState.playerX = Math.max(5, gameState.playerX - moveSpeed);
      }
      if (keys.right) {
        gameState.playerX = Math.min(roadWidth - 65, gameState.playerX + moveSpeed);
      }
      
      playerCar.style.left = gameState.playerX + 'px';
      
      if (keys.left || keys.right) {
        requestAnimationFrame(movePlayer);
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' && !keys.left) {
        keys.left = true;
        movePlayer();
      }
      if (e.key === 'ArrowRight' && !keys.right) {
        keys.right = true;
        movePlayer();
      }
    });

    document.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowLeft') keys.left = false;
      if (e.key === 'ArrowRight') keys.right = false;
    });

    // Touch controls
    leftBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      keys.left = true;
      movePlayer();
    });
    leftBtn.addEventListener('touchend', () => keys.left = false);

    rightBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      keys.right = true;
      movePlayer();
    });
    rightBtn.addEventListener('touchend', () => keys.right = false);

    // Button events
    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);

    // Initialize
    onConfigChange(config);
  </script>
