<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet">
  <style>
    .game-font { font-family: 'Press Start 2P', monospace; }
    .snake-segment {
      background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
      border-radius: 4px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.3);
    }
    .snake-head {
      background: linear-gradient(135deg, #86efac 0%, #4ade80 100%);
      border-radius: 6px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.4);
    }
       .grid-cell {
      background: rgba(30, 41, 59, 0.3);
      border: 1px solid rgba(71, 85, 105, 0.2);
    }
    .food {
      background: radial-gradient(circle at 30% 30%, #fca5a5 0%, #ef4444 60%, #dc2626 100%);
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(255, 0, 0, 0.5);
      animation: pulse 0.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(0.9); }
      50% { transform: scale(1); }
    }
 
    .game-over-overlay {
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .control-btn {
      transition: all 0.1s ease;
    }
    .control-btn:active {
      transform: scale(0.95);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-slate-900 overflow-auto">
  <div class="min-h-full w-full flex flex-col items-center justify-center p-4"><!-- Header -->
   <div class="text-center mb-4">
    <h1 id="game-title" class="game-font text-emerald-400 text-lg sm:text-2xl mb-2">🐍 SNAKE</h1>
    <div class="flex items-center justify-center gap-6 game-font text-xs">
     <div class="text-slate-300">
      SCORE: <span id="score" class="text-yellow-400">0</span>
     </div>
     <div class="text-slate-300">
      HIGH: <span id="high-score" class="text-emerald-400">0</span>
     </div>
    </div>
   </div><!-- Game Board -->
   <div class="relative">
    <div id="game-board" class="grid gap-0 bg-slate-800 rounded-lg p-2 shadow-2xl shadow-emerald-900/20 border border-slate-700" style="grid-template-columns: repeat(20, 1fr);"><!-- Grid cells will be generated by JS -->
    </div><!-- Game Over Overlay -->
    <div id="game-over" class="hidden absolute inset-0 bg-slate-900/90 rounded-lg flex flex-col items-center justify-center game-over-overlay">
     <div class="text-center">
      <div class="game-font text-red-400 text-xl mb-2">
       GAME OVER
      </div>
      <div class="game-font text-yellow-400 text-sm mb-4">
       Score: <span id="final-score">0</span>
      </div><button id="restart-btn" class="game-font text-xs bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-lg transition-colors"> PLAY AGAIN </button>
     </div>
    </div><!-- Start Overlay -->
    <div id="start-screen" class="absolute inset-0 bg-slate-900/90 rounded-lg flex flex-col items-center justify-center">
     <div class="text-center">
      <div class="text-6xl mb-4">
       🐍
      </div>
      <div class="game-font text-emerald-400 text-lg mb-6">
       SNAKE
      </div><button id="start-btn" class="game-font text-xs bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-3 rounded-lg transition-colors mb-4"> START GAME </button>
      <div class="game-font text-slate-400 text-[8px] leading-relaxed">
       <p>USE ARROW KEYS OR</p>
       <p>SWIPE TO MOVE</p>
      </div>
     </div>
    </div>
   </div><!-- Mobile Controls -->
   <div class="mt-6 sm:hidden">
    <div class="grid grid-cols-3 gap-2 w-36">
     <div></div><button id="btn-up" class="control-btn bg-slate-700 hover:bg-slate-600 text-white p-4 rounded-lg text-xl">↑</button>
     <div></div><button id="btn-left" class="control-btn bg-slate-700 hover:bg-slate-600 text-white p-4 rounded-lg text-xl">←</button> <button id="btn-down" class="control-btn bg-slate-700 hover:bg-slate-600 text-white p-4 rounded-lg text-xl">↓</button> <button id="btn-right" class="control-btn bg-slate-700 hover:bg-slate-600 text-white p-4 rounded-lg text-xl">→</button>
    </div>
   </div><!-- Instructions -->
   <div class="mt-4 game-font text-slate-500 text-[8px] text-center hidden sm:block">
    <p>ARROW KEYS TO MOVE • EAT THE RED FOOD TO GROW</p>
   </div>
  </div>
  <script>
    // Game configuration
    const GRID_SIZE = 20;
    const CELL_SIZE = 16;
    const INITIAL_SPEED = 150;
    const SPEED_INCREASE = 5;
    const MIN_SPEED = 60;

    // Game state
    let snake = [];
    let food = { x: 0, y: 0 };
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let score = 0;
    let highScore = 0;
    let gameSpeed = INITIAL_SPEED;
    let gameLoop = null;
    let isGameRunning = false;

    // DOM elements
    const gameBoard = document.getElementById('game-board');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('high-score');
    const gameOverEl = document.getElementById('game-over');
    const finalScoreEl = document.getElementById('final-score');
    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');

    // Default configuration
    const defaultConfig = {
      game_title: '🐍 SNAKE',
      primary_color: '#4ade80',
      background_color: '#0f172a',
      text_color: '#e2e8f0',
      accent_color: '#facc15',
      surface_color: '#1e293b'
    };

    let config = { ...defaultConfig };

    // Initialize game board grid
    function initializeBoard() {
      gameBoard.innerHTML = '';
      gameBoard.style.width = `${GRID_SIZE * CELL_SIZE + 16}px`;
      gameBoard.style.height = `${GRID_SIZE * CELL_SIZE + 16}px`;
      
      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          const cell = document.createElement('div');
          cell.className = 'grid-cell';
          cell.style.width = `${CELL_SIZE}px`;
          cell.style.height = `${CELL_SIZE}px`;
          cell.dataset.x = x;
          cell.dataset.y = y;
          gameBoard.appendChild(cell);
        }
      }
    }

    // Initialize snake
    function initializeSnake() {
      snake = [
        { x: 5, y: 10 },
        { x: 4, y: 10 },
        { x: 3, y: 10 }
      ];
    }

    // Spawn food at random position
    function spawnFood() {
      let newFood;
      do {
        newFood = {
          x: Math.floor(Math.random() * GRID_SIZE),
          y: Math.floor(Math.random() * GRID_SIZE)
        };
      } while (snake.some(seg => seg.x === newFood.x && seg.y === newFood.y));
      food = newFood;
    }

    // Render the game
    function render() {
      // Clear all cells
      const cells = gameBoard.querySelectorAll('.grid-cell');
      cells.forEach(cell => {
        cell.className = 'grid-cell';
        cell.innerHTML = '';
      });

      // Render snake
      snake.forEach((segment, index) => {
        const cell = gameBoard.querySelector(`[data-x="${segment.x}"][data-y="${segment.y}"]`);
        if (cell) {
          if (index === 0) {
            cell.classList.add('snake-head');
          } else {
            cell.classList.add('snake-segment');
          }
        }
      });

      // Render food
      const foodCell = gameBoard.querySelector(`[data-x="${food.x}"][data-y="${food.y}"]`);
      if (foodCell) {
        foodCell.classList.add('food');
      }
    }

    // Move snake
    function moveSnake() {
      direction = { ...nextDirection };
      
      const head = { 
        x: snake[0].x + direction.x, 
        y: snake[0].y + direction.y 
      };

      // Check wall collision
      if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
        gameOver();
        return;
      }

      // Check self collision
      if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
        gameOver();
        return;
      }

      snake.unshift(head);

      // Check food collision
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        spawnFood();
        
        // Increase speed
        if (gameSpeed > MIN_SPEED) {
          gameSpeed -= SPEED_INCREASE;
          clearInterval(gameLoop);
          gameLoop = setInterval(gameStep, gameSpeed);
        }
      } else {
        snake.pop();
      }

      render();
    }

    // Game step
    function gameStep() {
      if (isGameRunning) {
        moveSnake();
      }
    }

    // Start game
    function startGame() {
      score = 0;
      gameSpeed = INITIAL_SPEED;
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      
      scoreEl.textContent = score;
      initializeSnake();
      spawnFood();
      render();
      
      startScreen.classList.add('hidden');
      gameOverEl.classList.add('hidden');
      
      isGameRunning = true;
      gameLoop = setInterval(gameStep, gameSpeed);
    }

    // Game over
    function gameOver() {
      isGameRunning = false;
      clearInterval(gameLoop);
      
      if (score > highScore) {
        highScore = score;
        highScoreEl.textContent = highScore;
      }
      
      finalScoreEl.textContent = score;
      gameOverEl.classList.remove('hidden');
    }

    // Handle keyboard input
    function handleKeydown(e) {
      if (!isGameRunning) return;
      
      switch (e.key) {
        case 'ArrowUp':
          if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
          e.preventDefault();
          break;
        case 'ArrowDown':
          if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
          e.preventDefault();
          break;
        case 'ArrowLeft':
          if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
          e.preventDefault();
          break;
        case 'ArrowRight':
          if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
          e.preventDefault();
          break;
      }
    }

    // Mobile controls
    function setupMobileControls() {
      document.getElementById('btn-up').addEventListener('click', () => {
        if (isGameRunning && direction.y !== 1) nextDirection = { x: 0, y: -1 };
      });
      document.getElementById('btn-down').addEventListener('click', () => {
        if (isGameRunning && direction.y !== -1) nextDirection = { x: 0, y: 1 };
      });
      document.getElementById('btn-left').addEventListener('click', () => {
        if (isGameRunning && direction.x !== 1) nextDirection = { x: -1, y: 0 };
      });
      document.getElementById('btn-right').addEventListener('click', () => {
        if (isGameRunning && direction.x !== -1) nextDirection = { x: 1, y: 0 };
      });
    }

    // Touch swipe support
    let touchStartX = 0;
    let touchStartY = 0;

    function handleTouchStart(e) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }

    function handleTouchEnd(e) {
      if (!isGameRunning) return;
      
      const touchEndX = e.changedTouches[0].clientX;
      const touchEndY = e.changedTouches[0].clientY;
      
      const dx = touchEndX - touchStartX;
      const dy = touchEndY - touchStartY;
      
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 30 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
        else if (dx < -30 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
      } else {
        if (dy > 30 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
        else if (dy < -30 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
      }
    }

    // Element SDK integration
    async function onConfigChange(newConfig) {
      config = { ...defaultConfig, ...newConfig };
      document.getElementById('game-title').textContent = config.game_title || defaultConfig.game_title;
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => { config.background_color = value; window.elementSdk.setConfig({ background_color: value }); }
          },
          {
            get: () => config.surface_color || defaultConfig.surface_color,
            set: (value) => { config.surface_color = value; window.elementSdk.setConfig({ surface_color: value }); }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => { config.text_color = value; window.elementSdk.setConfig({ text_color: value }); }
          },
          {
            get: () => config.primary_color || defaultConfig.primary_color,
            set: (value) => { config.primary_color = value; window.elementSdk.setConfig({ primary_color: value }); }
          },
          {
            get: () => config.accent_color || defaultConfig.accent_color,
            set: (value) => { config.accent_color = value; window.elementSdk.setConfig({ accent_color: value }); }
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ['game_title', config.game_title || defaultConfig.game_title]
      ]);
    }

    // Initialize
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }

    initializeBoard();
    render();

    // Event listeners
    document.addEventListener('keydown', handleKeydown);
    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);
    setupMobileControls();
    
    gameBoard.addEventListener('touchstart', handleTouchStart, { passive: true });
    gameBoard.addEventListener('touchend', handleTouchEnd, { passive: true });
  </script>
