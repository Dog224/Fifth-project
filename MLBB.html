<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBB Support Battle</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .hero-card { transition: transform 0.2s; cursor:pointer; text-align:center; }
  .hero-card.selected { transform: scale(1.05); border-width:3px; }
  .hero-card img { width:50px; height:50px; object-fit:contain; margin-bottom:4px; }
  .battle-hero { transition: all 0.2s; position:relative; }
  .health-bar { transition: width 0.3s; }
</style>
</head>
<body class="bg-gray-900 text-white font-sans p-4">

<h1 class="text-3xl font-bold mb-4 text-center">Mobile Legends Battle</h1>

<!-- HERO SELECTION -->
<h2 class="text-xl font-bold mt-4">Selected Heroes</h2>
<div id="selected-heroes" class="flex gap-4 mb-4"></div>
<div class="text-center mb-6">
  <button id="start-battle-btn" disabled class="px-8 py-3 rounded-full bg-gray-700 text-gray-400 text-xl font-bold cursor-not-allowed">Select 3 heroes</button>
</div>

<!-- HERO ZONES -->
<div id="hero-zones" class="space-y-6"></div>

<!-- BATTLE AREA -->
<h2 class="text-xl font-bold mb-2">Battle</h2>
<div id="battle-area" class="flex justify-around flex-wrap gap-6 mb-6"></div>

<!-- BATTLE LOG -->
<h2 class="text-xl font-bold mb-2">Battle Log</h2>
<div id="battle-log" class="bg-gray-800 p-4 rounded h-64 overflow-y-auto text-sm"></div>

<script>
const heroes = [
  { id:1, name:"Belerick", role:"tank", hp:8000, atk:180, def:300, image:"images/covers/be.png", color:"#4a5568" },
  { id:2, name:"Grock", role:"tank", hp:8500, atk:150, def:350, image:"images/covers/w.png", color:"#6b5b45" },
  { id:3, name:"Edith", role:"tank", hp:7500, atk:200, def:280, image:"images/covers/ff.png", color:"#718096" },
  { id:4, name:"Benedetta", role:"fighter", hp:6000, atk:280, def:180, image:"images/covers/b.png", color:"#c53030" },
  { id:5, name:"Yu Zhong", role:"fighter", hp:5800, atk:300, def:160, image:"images/covers/d.png", color:"#d69e2e" },
  { id:6, name:"Freya", role:"fighter", hp:6200, atk:260, def:200, image:"images/covers/Freya.png", color:"#9f7aea" },
  { id:10, name:"Aurora", role:"mage", hp:4000, atk:400, def:80, image:"images/covers/uuu.png", color:"#63b3ed" },
  { id:11, name:"Valir", role:"mage", hp:3800, atk:420, def:70, image:"images/covers/V.png", color:"#f56565" },
  { id:12, name:"Luo yi", role:"mage", hp:4200, atk:380, def:90, image:"images/covers/L.png", color:"#d53f8c" },
  { id:13, name:"Miya", role:"marksman", hp:4200, atk:360, def:90, image:"images/covers/miya.png", color:"#68d391" },
  { id:14, name:"Granger", role:"marksman", hp:4000, atk:380, def:85, image:"images/covers/gran.png", color:"#a0aec0" },
  { id:15, name:"Irithel", role:"marksman", hp:4400, atk:340, def:100, image:"images/covers/it.png", color:"#ed8936" },
  { id:16, name:"Angela", role:"support", hp:5000, atk:200, def:150, image:"images/covers/raila.png", color:"#f687b3" },
  { id:17, name:"Estes", role:"support", hp:4800, atk:220, def:140, image:"images/covers/estes.png", color:"#faf089" },
  { id:18, name:"Rafaela", role:"support", hp:4600, atk:180, def:160, image:"images/covers/rafaela.png", color:"#9ae6b4" },
  { id:19, name:"Floryn", role:"support", hp:5200, atk:190, def:180, image:"images/covers/Floryn.png", color:"#90cdf4" },
  { id:20, name:"Diggie", role:"support", hp:4400, atk:250, def:130, image:"images/covers/diggie.png", color:"#b794f4" }
];

let selectedHeroes=[];
let playerTeam=[];
let enemyTeam=[];
let isPlayerTurn=true;

// ===== RENDER HERO ZONES =====
function renderHeroZones(){
  const zones=['tank','fighter','mage','marksman','support'];
  const container = document.getElementById('hero-zones');
  container.innerHTML = zones.map(role=>{
    const roleHeroes = heroes.filter(h=>h.role===role);
    if(roleHeroes.length===0) return '';
    return `<div>
      <h2 class="text-lg font-bold capitalize mb-2">${role}</h2>
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4 mb-4">
      ${roleHeroes.map(h=>`
        <div class="hero-card rounded-xl p-3 border-2 ${selectedHeroes.includes(h.id)?'selected':''}" 
             style="border-color:${h.color};background: linear-gradient(135deg, ${h.color}40, ${h.color}80);" 
             onclick="toggleHeroSelection(${h.id})">
          <img src="${h.image}" alt="${h.name}">
          <h3 class="text-sm font-bold text-center">${h.name}</h3>
          <div class="text-xs text-center text-gray-300">HP:${h.hp} ⚔️${h.atk} 🛡️${h.def}</div>
        </div>`).join('')}
      </div></div>`;
  }).join('');
}

// ===== SELECTED HEROES =====
function renderSelectedHeroes(){
  const container=document.getElementById('selected-heroes');
  container.innerHTML=[0,1,2].map(i=>{
    if(selectedHeroes[i]){
      const h=heroes.find(hh=>hh.id===selectedHeroes[i]);
      return `<div class="w-16 h-16 rounded-full bg-gray-700 flex items-center justify-center cursor-pointer" onclick="removeHeroSelection(${h.id})">
        <img src="${h.image}" alt="${h.name}" class="w-12 h-12 object-contain">
      </div>`;
    } else return `<div class="w-16 h-16 rounded-full border-2 border-dashed border-gray-500 flex items-center justify-center text-gray-500">${i+1}</div>`;
  }).join('');
  const btn=document.getElementById('start-battle-btn');
  if(selectedHeroes.length===3){
    btn.disabled=false;
    btn.className="px-8 py-3 rounded-full bg-yellow-500 text-black font-bold text-xl cursor-pointer";
    btn.textContent="⚔️ Start Battle!";
  } else {
    btn.disabled=true;
    btn.className="px-8 py-3 rounded-full bg-gray-700 text-gray-400 font-bold text-xl cursor-not-allowed";
    btn.textContent=`Select ${3-selectedHeroes.length} more`;
  }
}

// ===== SELECTION LOGIC =====
function toggleHeroSelection(id){
  if(!selectedHeroes.includes(id) && selectedHeroes.length<3) selectedHeroes.push(id);
  else selectedHeroes = selectedHeroes.filter(h=>h!==id);
  renderSelectedHeroes();
  renderHeroZones();
}

function removeHeroSelection(id){
  selectedHeroes = selectedHeroes.filter(h=>h!==id);
  renderSelectedHeroes();
  renderHeroZones();
}

// ===== BATTLE =====
function startBattle(){
  playerTeam = selectedHeroes.map(id=>({...heroes.find(h=>h.id===id), currentHp:heroes.find(h=>h.id===id).hp}));
  const enemyPool=heroes.filter(h=>!selectedHeroes.includes(h.id));
  enemyTeam = enemyPool.sort(()=>Math.random()-0.5).slice(0,3).map(h=>({...h, currentHp:h.hp}));
  renderBattle();
  logBattle("Battle Start!");
  setTimeout(nextTurn,1000);
}

function renderBattle(){
  const area=document.getElementById('battle-area');
  area.innerHTML=`<div class="flex gap-4">${playerTeam.map(h=>renderHeroBattle(h)).join('')}</div>
                  <div class="flex gap-4 mt-4">${enemyTeam.map(h=>renderHeroBattle(h)).join('')}</div>`;
}

function renderHeroBattle(h){
  const hpPercent=Math.max(0,(h.currentHp/h.hp)*100);
  return `<div class="battle-hero p-2 w-28 rounded-xl bg-gray-800 ${h.currentHp<=0?'opacity-40 grayscale':''}">
    <div class="text-center font-bold">${h.name}</div>
    <img src="${h.image}" alt="${h.name}" class="w-12 h-12 object-contain mx-auto">
    <div class="mt-2 bg-black h-3 rounded-full overflow-hidden">
      <div class="health-bar h-full ${hpPercent>50?'bg-green-500':hpPercent>25?'bg-yellow-500':'bg-red-500'}" style="width:${hpPercent}%"></div>
    </div>
    <div class="text-xs mt-1">${Math.max(0,Math.floor(h.currentHp))}/${h.hp}</div>
  </div>`;
}

function logBattle(msg){
  const log=document.getElementById('battle-log');
  log.innerHTML+=`<div>${msg}</div>`;
  log.scrollTop=log.scrollHeight;
}

function nextTurn(){
  if(playerTeam.every(h=>h.currentHp<=0)){ logBattle("Enemies Win! 💀"); return; }
  if(enemyTeam.every(h=>h.currentHp<=0)){ logBattle("You Win! 🎉"); return; }
  
  const attackerTeam=isPlayerTurn?playerTeam:enemyTeam;
  const targetTeam=isPlayerTurn?enemyTeam:playerTeam;
  const aliveAttackers=attackerTeam.filter(h=>h.currentHp>0);
  const aliveTargets=targetTeam.filter(h=>h.currentHp>0);

  const attacker=aliveAttackers[Math.floor(Math.random()*aliveAttackers.length)];
  const target=aliveTargets[Math.floor(Math.random()*aliveTargets.length)];

  const damage=Math.max(attacker.atk - target.def*0.5,10);
  target.currentHp-=damage;
  logBattle(`${isPlayerTurn?attacker.name:"Enemy "+attacker.name} attacks ${target.name} for ${Math.floor(damage)} damage`);

  renderBattle();
  isPlayerTurn = !isPlayerTurn;
  setTimeout(nextTurn,1000);
}

// INITIAL RENDER
renderHeroZones();
renderSelectedHeroes();
document.getElementById('start-battle-btn').onclick=startBattle;
</script>

</body>
</html>
