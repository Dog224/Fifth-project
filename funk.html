<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funk Dungeon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Arial Black', sans-serif;
      background: linear-gradient(135deg, #1a0033 0%, #2d004d 100%);
      color: #fff;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: linear-gradient(135deg, #1a0033 0%, #2d004d 50%, #330033 100%);
    }

    .game-ui {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      font-size: 24px;
      font-weight: bold;
      z-index: 100;
      text-shadow: 0 0 10px #00ff88;
    }

    .stat {
      background: rgba(0, 255, 136, 0.1);
      padding: 10px 20px;
      border-radius: 10px;
      border: 2px solid #00ff88;
    }

    #game-canvas {
      border: 3px solid #ff00ff;
      box-shadow: 0 0 30px #ff00ff, inset 0 0 30px rgba(255, 0, 255, 0.3);
      background: #000;
    }

    #start-screen, #game-over-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      text-align: center;
    }

    #start-screen h1 {
      font-size: 72px;
      margin-bottom: 20px;
      color: #ff00ff;
      text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ff88;
      animation: pulse 2s infinite;
    }

    #start-screen p {
      font-size: 20px;
      margin-bottom: 40px;
      color: #00ff88;
    }

    #start-screen button, #game-over-screen button {
      font-size: 24px;
      padding: 15px 40px;
      background: linear-gradient(135deg, #ff00ff, #00ff88);
      border: none;
      color: #000;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 0 20px #ff00ff;
    }

    #start-screen button:hover, #game-over-screen button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px #ff00ff, 0 0 15px #00ff88;
    }

    #game-over-screen {
      display: none;
    }

    #game-over-screen h2 {
      font-size: 60px;
      color: #ff0066;
      margin-bottom: 30px;
      text-shadow: 0 0 20px #ff0066;
    }

    #game-over-screen .final-score {
      font-size: 32px;
      margin-bottom: 20px;
      color: #00ff88;
    }

    .hidden {
      display: none !important;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes funk-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div id="game-container">
   <div id="start-screen">
    <h1>🎷 FUNK DUNGEON 🎷</h1>
    <p>Groove through the funky dungeon!</p>
    <p style="font-size: 16px; margin-bottom: 20px;">Use ARROW KEYS to move | SPACE to attack | Collect all the grooves!</p><button onclick="startGame()">GET FUNKY</button>
   </div>
   <div id="game-over-screen">
    <h2>GAME OVER</h2>
    <div class="final-score">
     Score: <span id="final-score">0</span>
    </div>
    <div style="font-size: 20px; margin-bottom: 30px;">
     Grooves Collected: <span id="grooves-collected">0</span>
    </div><button onclick="location.reload()">TRY AGAIN</button>
   </div>
   <div class="game-ui">
    <div class="stat">
     ♥ Health: <span id="health">3</span>
    </div>
    <div class="stat">
     🎵 Score: <span id="score">0</span>
    </div>
    <div class="stat">
     ✨ Grooves: <span id="grooves">0</span>/3
    </div>
   </div>
   <canvas id="game-canvas"></canvas>
  </div>
  <script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    // Set canvas size
    canvas.width = 800;
    canvas.height = 600;

    // Game variables
    let gameRunning = false;
    let health = 3;
    let score = 0;
    let grooves = 0;
    const maxGrooves = 3;

    // Player object
    const player = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      width: 30,
      height: 30,
      speed: 5,
      vx: 0,
      vy: 0,
      attacking: false,
      attackTimer: 0
    };

    // Arrays for game objects
    let enemies = [];
    let projectiles = [];
    let powerUps = [];
    let particles = [];

    // Keyboard input
    const keys = {};
    window.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      if (e.key === ' ') {
        e.preventDefault();
        attack();
      }
    });
    window.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    // Enemy class
    class Enemy {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.width = 25;
        this.height = 25;
        this.speed = 2;
        this.health = 1;
      }

      update() {
        // Move towards player
        const dx = player.x - this.x;
        const dy = player.y - this.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        if (distance > 0) {
          this.x += (dx / distance) * this.speed;
          this.y += (dy / distance) * this.speed;
        }
      }

      draw() {
        // Draw funky enemy
        ctx.fillStyle = '#ff0066';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.width, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#ff00ff';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Eyes
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(this.x - 8, this.y - 5, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(this.x + 8, this.y - 5, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      isHit(x, y, radius) {
        const dx = this.x - x;
        const dy = this.y - y;
        return Math.sqrt(dx * dx + dy * dy) < radius + this.width;
      }
    }

    // Power-up class
    class PowerUp {
      constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.width = 20;
        this.height = 20;
        this.type = type; // 'groove', 'health'
        this.time = 0;
      }

      update() {
        this.time += 0.05;
        this.y += Math.sin(this.time) * 0.5;
      }

      draw() {
        if (this.type === 'groove') {
          ctx.fillStyle = '#00ff88';
          ctx.font = 'bold 20px Arial';
          ctx.fillText('♪', this.x - 8, this.y + 8);
        } else {
          ctx.fillStyle = '#ff6600';
          ctx.font = 'bold 20px Arial';
          ctx.fillText('♥', this.x - 8, this.y + 8);
        }
      }

      isCollected(px, py, pwidth) {
        return Math.abs(this.x - px) < pwidth + this.width &&
               Math.abs(this.y - py) < pwidth + this.height;
      }
    }

    // Particle class
    class Particle {
      constructor(x, y, vx, vy, color) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.color = color;
        this.life = 1;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.1; // gravity
        this.life -= 0.02;
      }

      draw() {
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.life;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    function createExplosion(x, y, color) {
      for (let i = 0; i < 8; i++) {
        const angle = (Math.PI * 2 * i) / 8;
        const vx = Math.cos(angle) * 4;
        const vy = Math.sin(angle) * 4;
        particles.push(new Particle(x, y, vx, vy, color));
      }
    }

    function attack() {
      if (!gameRunning) return;
      player.attacking = true;
      player.attackTimer = 10;

      // Hit enemies
      for (let i = enemies.length - 1; i >= 0; i--) {
        if (enemies[i].isHit(player.x, player.y, 40)) {
          createExplosion(enemies[i].x, enemies[i].y, '#ff00ff');
          enemies.splice(i, 1);
          score += 100;
        }
      }
    }

    function spawnEnemy() {
      const side = Math.floor(Math.random() * 4);
      let x, y;
      if (side === 0) { x = Math.random() * canvas.width; y = -30; }
      else if (side === 1) { x = canvas.width + 30; y = Math.random() * canvas.height; }
      else if (side === 2) { x = Math.random() * canvas.width; y = canvas.height + 30; }
      else { x = -30; y = Math.random() * canvas.height; }
      enemies.push(new Enemy(x, y));
    }

    function spawnPowerUp(x, y, type) {
      powerUps.push(new PowerUp(x, y, type));
    }

    function update() {
      if (!gameRunning) return;

      // Player movement
      player.vx = 0;
      player.vy = 0;
      if (keys['ArrowUp'] || keys['w']) player.vy = -player.speed;
      if (keys['ArrowDown'] || keys['s']) player.vy = player.speed;
      if (keys['ArrowLeft'] || keys['a']) player.vx = -player.speed;
      if (keys['ArrowRight'] || keys['d']) player.vx = player.speed;

      player.x += player.vx;
      player.y += player.vy;

      // Boundary check
      player.x = Math.max(player.width, Math.min(canvas.width - player.width, player.x));
      player.y = Math.max(player.height, Math.min(canvas.height - player.height, player.y));

      // Update attack timer
      if (player.attackTimer > 0) {
        player.attackTimer--;
      } else {
        player.attacking = false;
      }

      // Update enemies
      for (let enemy of enemies) {
        enemy.update();

        // Check collision with player
        if (Math.abs(enemy.x - player.x) < player.width + enemy.width &&
            Math.abs(enemy.y - player.y) < player.height + enemy.height) {
          health--;
          createExplosion(player.x, player.y, '#ff0066');
          enemies.splice(enemies.indexOf(enemy), 1);
          if (health <= 0) {
            gameRunning = false;
            endGame();
          }
        }
      }

      // Update power-ups
      for (let i = powerUps.length - 1; i >= 0; i--) {
        powerUps[i].update();
        if (powerUps[i].isCollected(player.x, player.y, player.width)) {
          if (powerUps[i].type === 'groove') {
            grooves++;
            score += 500;
            createExplosion(powerUps[i].x, powerUps[i].y, '#00ff88');
          } else if (powerUps[i].type === 'health' && health < 5) {
            health++;
            createExplosion(powerUps[i].x, powerUps[i].y, '#ff6600');
          }
          powerUps.splice(i, 1);
        }
      }

      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].life <= 0) {
          particles.splice(i, 1);
        }
      }

      // Update UI
      document.getElementById('health').textContent = health;
      document.getElementById('score').textContent = score;
      document.getElementById('grooves').textContent = grooves;

      // Win condition
      if (grooves >= maxGrooves) {
        gameRunning = false;
        score += 5000;
        endGame();
      }
    }

    function draw() {
      // Clear canvas
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw grid background
      ctx.strokeStyle = 'rgba(255, 0, 255, 0.1)';
      ctx.lineWidth = 1;
      for (let i = 0; i < canvas.width; i += 50) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.stroke();
      }
      for (let i = 0; i < canvas.height; i += 50) {
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(canvas.width, i);
        ctx.stroke();
      }

      // Draw player
      if (player.attacking) {
        ctx.fillStyle = '#ffff00';
        ctx.shadowColor = '#ffff00';
        ctx.shadowBlur = 20;
      } else {
        ctx.fillStyle = '#00ff88';
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = 10;
      }
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.width, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowColor = 'transparent';

      // Draw attack radius
      if (player.attacking) {
        ctx.strokeStyle = 'rgba(255, 255, 0, 0.5)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(player.x, player.y, 40, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Draw enemies
      for (let enemy of enemies) {
        enemy.draw();
      }

      // Draw power-ups
      for (let powerUp of powerUps) {
        powerUp.draw();
      }

      // Draw particles
      for (let particle of particles) {
        particle.draw();
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    let spawnTimer = 0;
    let powerUpSpawnTimer = 0;

    function updateGameState() {
      spawnTimer++;
      if (spawnTimer > 60) {
        spawnEnemy();
        spawnTimer = 0;
      }

      powerUpSpawnTimer++;
      if (powerUpSpawnTimer > 120 && grooves < maxGrooves) {
        const type = Math.random() > 0.7 ? 'health' : 'groove';
        spawnPowerUp(Math.random() * canvas.width, Math.random() * canvas.height, type);
        powerUpSpawnTimer = 0;
      }

      if (gameRunning) {
        requestAnimationFrame(updateGameState);
      }
    }

    function startGame() {
      document.getElementById('start-screen').classList.add('hidden');
      gameRunning = true;
      health = 3;
      score = 0;
      grooves = 0;
      enemies = [];
      powerUps = [];
      particles = [];
      player.x = canvas.width / 2;
      player.y = canvas.height / 2;

      gameLoop();
      updateGameState();
    }

    function endGame() {
      document.getElementById('final-score').textContent = score;
      document.getElementById('grooves-collected').textContent = grooves;
      document.getElementById('game-over-screen').style.display = 'flex';
    }
  </script>
