<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sheep Counting Sleep Game</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Quicksand', sans-serif; }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes jump {
      0% { transform: translateX(-150px) translateY(0) rotate(0deg); }
      25% { transform: translateX(-50px) translateY(-120px) rotate(-5deg); }
      50% { transform: translateX(50px) translateY(-140px) rotate(0deg); }
      75% { transform: translateX(150px) translateY(-80px) rotate(5deg); }
      100% { transform: translateX(250px) translateY(0) rotate(0deg); }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .star {
      animation: twinkle 3s ease-in-out infinite;
    }
    
    .moon {
      animation: float 6s ease-in-out infinite;
    }
    
    .sheep-jumping {
      animation: jump 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    
    .fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
    
    .fence-post {
      background: linear-gradient(180deg, #8B7355 0%, #6B5344 100%);
    }
    
    .grass {
      background: linear-gradient(180deg, #3d6b4f 0%, #2d5a3f 100%);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full m-0 overflow-hidden">
  <div id="app" class="h-full w-full relative overflow-hidden" style="background: linear-gradient(180deg, #0f1729 0%, #1a2744 30%, #243b5c 60%, #2d4a6f 100%);"><!-- Stars -->
   <div id="stars" class="absolute inset-0 pointer-events-none"></div><!-- Moon -->
   <div class="moon absolute top-8 right-12 w-20 h-20 rounded-full" style="background: linear-gradient(135deg, #fef3c7 0%, #fde68a 50%, #fcd34d 100%); box-shadow: 0 0 60px rgba(253, 230, 138, 0.5), 0 0 100px rgba(253, 230, 138, 0.3);"></div><!-- Content Container -->
   <div class="relative z-10 h-full flex flex-col items-center justify-between py-8 px-4"><!-- Header -->
    <div class="text-center fade-in">
     <h1 id="title" class="text-4xl md:text-5xl font-bold text-white mb-2" style="text-shadow: 0 2px 20px rgba(255,255,255,0.3);">Count the Sheep</h1>
     <p id="instruction" class="text-lg text-indigo-200 opacity-80">Tap to make sheep jump over the fence</p>
    </div><!-- Counter -->
    <div class="fade-in" style="animation-delay: 0.2s;">
     <div class="bg-white/10 backdrop-blur-sm rounded-3xl px-12 py-6 border border-white/20">
      <p class="text-indigo-200 text-sm uppercase tracking-widest mb-1">Sheep Counted</p>
      <p id="counter" class="text-7xl md:text-8xl font-bold text-white" style="text-shadow: 0 4px 30px rgba(255,255,255,0.4);">0</p>
     </div>
    </div><!-- Game Area -->
    <div class="relative w-full max-w-lg h-48 fade-in" style="animation-delay: 0.4s;"><!-- Fence -->
     <div class="absolute bottom-12 left-1/2 transform -translate-x-1/2 flex items-end gap-1">
      <div class="fence-post w-3 h-20 rounded-t"></div>
      <div class="fence-post w-3 h-16 rounded-t"></div>
      <div class="fence-post w-3 h-20 rounded-t"></div><!-- Horizontal bars -->
      <div class="absolute bottom-14 left-0 right-0 h-2 bg-gradient-to-r from-transparent via-amber-700 to-transparent rounded"></div>
      <div class="absolute bottom-8 left-0 right-0 h-2 bg-gradient-to-r from-transparent via-amber-700 to-transparent rounded"></div>
     </div><!-- Sheep Container -->
     <div id="sheep-container" class="absolute inset-0 pointer-events-none"></div><!-- Tap Area --> <button id="tap-area" class="absolute inset-0 w-full h-full cursor-pointer bg-transparent border-0 outline-none focus:outline-none active:outline-none" aria-label="Tap to make sheep jump"> </button>
    </div><!-- Ground/Grass -->
    <div class="absolute bottom-0 left-0 right-0 h-16 grass"></div><!-- Footer hint -->
    <div class="text-center fade-in opacity-60" style="animation-delay: 0.6s;">
     <p class="text-indigo-300 text-sm">🌙 Keep counting until you feel sleepy...</p>
    </div>
   </div>
  </div>
  <script>
    const defaultConfig = {
      title_text: "Count the Sheep",
      instruction_text: "Tap to make sheep jump over the fence",
      background_color: "#0f1729",
      surface_color: "#ffffff1a",
      text_color: "#ffffff",
      primary_action_color: "#fde68a",
      secondary_action_color: "#a5b4fc",
      font_family: "Quicksand",
      font_size: 16
    };

    let sheepCount = 0;

    // Create stars
    function createStars() {
      const starsContainer = document.getElementById('stars');
      for (let i = 0; i < 50; i++) {
        const star = document.createElement('div');
        star.className = 'star absolute rounded-full';
        star.style.width = Math.random() * 3 + 1 + 'px';
        star.style.height = star.style.width;
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 60 + '%';
        star.style.background = '#fff';
        star.style.animationDelay = Math.random() * 3 + 's';
        starsContainer.appendChild(star);
      }
    }

    // Create and animate sheep
    function createSheep() {
      const container = document.getElementById('sheep-container');
      const sheep = document.createElement('div');
      sheep.className = 'sheep-jumping absolute';
      sheep.style.left = '50%';
      sheep.style.bottom = '50px';
      sheep.innerHTML = `
        <svg width="80" height="60" viewBox="0 0 80 60" fill="none">
          <!-- Body wool -->
          <ellipse cx="40" cy="35" rx="28" ry="20" fill="#f5f5f5"/>
          <circle cx="25" cy="30" r="12" fill="#fafafa"/>
          <circle cx="55" cy="30" r="12" fill="#fafafa"/>
          <circle cx="40" cy="25" r="14" fill="#fff"/>
          <circle cx="30" cy="38" r="10" fill="#f5f5f5"/>
          <circle cx="50" cy="38" r="10" fill="#f5f5f5"/>
          <!-- Head -->
          <ellipse cx="65" cy="25" rx="12" ry="10" fill="#2d2d2d"/>
          <!-- Ears -->
          <ellipse cx="58" cy="18" rx="4" ry="6" fill="#2d2d2d"/>
          <ellipse cx="72" cy="18" rx="4" ry="6" fill="#2d2d2d"/>
          <!-- Eyes -->
          <circle cx="62" cy="23" r="2" fill="#fff"/>
          <circle cx="68" cy="23" r="2" fill="#fff"/>
          <!-- Legs -->
          <rect x="28" y="48" width="4" height="12" rx="2" fill="#2d2d2d"/>
          <rect x="36" y="48" width="4" height="12" rx="2" fill="#2d2d2d"/>
          <rect x="44" y="48" width="4" height="12" rx="2" fill="#2d2d2d"/>
          <rect x="52" y="48" width="4" height="12" rx="2" fill="#2d2d2d"/>
        </svg>
      `;
      
      container.appendChild(sheep);
      
      // Remove sheep after animation
      sheep.addEventListener('animationend', () => {
        sheep.remove();
      });
    }

    function incrementCounter() {
      sheepCount++;
      const counter = document.getElementById('counter');
      counter.textContent = sheepCount;
      counter.style.transform = 'scale(1.1)';
      setTimeout(() => {
        counter.style.transform = 'scale(1)';
      }, 150);
    }

    function handleTap() {
      createSheep();
      incrementCounter();
    }

    // Initialize stars
    createStars();

    // Set up tap handler
    document.getElementById('tap-area').addEventListener('click', handleTap);

    // Element SDK setup
    async function onConfigChange(config) {
      const titleEl = document.getElementById('title');
      const instructionEl = document.getElementById('instruction');
      
      titleEl.textContent = config.title_text || defaultConfig.title_text;
      instructionEl.textContent = config.instruction_text || defaultConfig.instruction_text;
      
      const fontFamily = config.font_family || defaultConfig.font_family;
      const baseFontStack = 'Quicksand, sans-serif';
      const fontStack = fontFamily !== 'Quicksand' ? `${fontFamily}, ${baseFontStack}` : baseFontStack;
      
      document.body.style.fontFamily = fontStack;
      titleEl.style.fontFamily = fontStack;
      
      const baseSize = config.font_size || defaultConfig.font_size;
      titleEl.style.fontSize = `${baseSize * 2.5}px`;
      instructionEl.style.fontSize = `${baseSize * 1.1}px`;
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: {
            get: () => config.font_family || defaultConfig.font_family,
            set: (value) => window.elementSdk.setConfig({ font_family: value })
          },
          fontSizeable: {
            get: () => config.font_size || defaultConfig.font_size,
            set: (value) => window.elementSdk.setConfig({ font_size: value })
          }
        }),
        mapToEditPanelValues: (config) => new Map([
          ["title_text", config.title_text || defaultConfig.title_text],
          ["instruction_text", config.instruction_text || defaultConfig.instruction_text]
        ])
      });
    } else {
      onConfigChange(defaultConfig);
    }
  </script>

</html>
